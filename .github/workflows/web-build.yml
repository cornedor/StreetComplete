name: Build web (PWA)

on:
  push:
    branches:
      - master
  pull_request:
    paths:
      - "web/**"
      - "settings.gradle.kts"
      - "build.gradle.kts"
      - ".github/workflows/web-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      - name: Build web bundle
        run: ./gradlew :web:wasmJsBrowserDistribution

      - name: Archive web bundle
        uses: actions/upload-artifact@v4
        with:
          name: streetcomplete-web
          path: web/build/dist/wasmJs/productionExecutable
          retention-days: 14
