<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>StreetComplete Web (preview)</title>
    <meta name="description" content="Easy to use OpenStreetMap editor — web preview (PWA port).">

    <!-- PWA: installability + theming -->
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#7DB6D8">
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

    <!-- iOS home-screen support (iOS ignores the web manifest for these) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="StreetComplete">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!--
      maplibre-gl-js (M2 map). Loaded from a CDN so the repo stays lean; this means the map needs
      network on first use and is not part of the offline shell yet (the tiles need network anyway
      until offline data / OPFS lands — see docs/pwa-port/ROADMAP.md). Loading it here, before the
      Wasm bundle below, guarantees the `maplibregl` global exists by the time main() runs; if it
      is missing (offline), the app detects that and comes up without a map.
    -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

    <!--
      sql.js (M1 web database). SQLite compiled to WebAssembly, loaded from a CDN like maplibre so
      the repo stays lean. It defines the global `initSqlJs`, which data/WebDatabase.kt calls to open
      an in-memory SQLite database (persisted to IndexedDB); the wasm binary (`sql-wasm.wasm`) is
      fetched from the same CDN dir on first use. Not part of the offline shell yet — if it is absent
      (offline / CDN blocked) the app detects that and comes up without persistence rather than
      crashing. Keep this version in sync with CDN_BASE in data/WebDatabase.kt.
    -->
    <script src="https://unpkg.com/sql.js@1.13.0/dist/sql-wasm.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Full-screen base map. */
        #map {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        /*
          Compose overlay: a fixed control card in the top-left corner. Compose mounts its canvas
          into this element (not the whole page), so only this card captures pointer events — the
          rest of the screen stays the interactive map.
        */
        #overlay {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 10;
            width: min(92vw, 380px);
            height: min(60vh, 320px);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="overlay"></div>

    <script src="streetcomplete-web.js"></script>
    <script>
        // Register the service worker so the installed PWA launches offline (see sw.js).
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("sw.js").catch(function (error) {
                    console.warn("Service worker registration failed:", error);
                });
            });
        }
    </script>
</body>
</html>
