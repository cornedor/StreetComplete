<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>StreetComplete Web (preview)</title>
    <meta name="description" content="Easy to use OpenStreetMap editor — web preview (PWA port).">

    <!-- PWA: installability + theming -->
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#7DB6D8">
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

    <!-- iOS home-screen support (iOS ignores the web manifest for these) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="StreetComplete">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
</head>
<body>
    <script src="streetcomplete-web.js"></script>
    <script>
        // Register the service worker so the installed PWA launches offline (see sw.js).
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("sw.js").catch(function (error) {
                    console.warn("Service worker registration failed:", error);
                });
            });
        }
    </script>
</body>
</html>
